services:
  dossarddb:
    container_name: dossarddb
    image: postgres:12-alpine3.20
    volumes:
      - postgres:/var/lib/postgresql/data:rw
    ports:
      - "5432:5432"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_HOST
      - POSTGRES_PORT
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - MONITORING_PASSWORD
      - MONITORING_USER
      - JWT_SECRET
      - JWT_EXPIRE_SECONDS
  api_webapp:
    container_name: api_webapp
    image: ghcr.io/dngconsulting/opendossard_api_webapp:latest
    command: "npm run start:prod"
    expose:
      - "9090"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_HOST
      - POSTGRES_PORT
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - MONITORING_PASSWORD
      - MONITORING_USER
      - JWT_SECRET
      - JWT_EXPIRE_SECONDS
      - NODE_ENV="production"
      - TSC_COMPILE_ON_ERROR="true"
      - DISABLE_ESLINT_PLUGIN="true"
      - CI="true"
      - PORT="80"
  # ══════════════════════════════════════════════════════════
  # V2 - NEW SERVICES
  # ══════════════════════════════════════════════════════════
  api-v2:
    container_name: api-v2
    image: ghcr.io/dngconsulting/opendossard_api-v2:latest
    restart: always
    expose:
      - "3001"
    # Logs envoyés au journal systemd de l'hôte (au lieu d'un fichier JSON Docker)
    # → lus par Netdata (Logs Explorer). Les lignes sont du JSON structuré
    # (cf. JsonLogger) : filtrer par `CONTAINER_NAME=api-v2` / `SYSLOG_IDENTIFIER=api-v2`
    # puis recherche plein-texte (ex: coller un requestId ramène toutes ses lignes).
    #
    # ── PRÉREQUIS HÔTE : journal systemd PERSISTANT (à faire avant le 1er deploy) ──
    # Sans ça, les logs vont dans /run/log/journal (volatile, perdu au reboot) et
    # Netdata ne voit rien dans /var/log/journal :
    #     sudo mkdir -p /var/log/journal
    #     sudo systemctl restart systemd-journald
    #   (optionnel : Storage=persistent dans /etc/systemd/journald.conf)
    #
    # ── RÉTENTION / TAILLE ──
    # Les options json-file `max-size`/`max-file` (ancien cap ~30 Mo par conteneur)
    # ne s'appliquent PAS à journald et n'ont donc pas d'équivalent par conteneur ici.
    # La taille est bornée GLOBALEMENT par journald (/etc/systemd/journald.conf) :
    # défaut SystemMaxUse ≈ 10 % du FS de /var/log/journal (plafonné à 4 Go), purge
    # auto des plus vieux segments. Pour maîtriser explicitement, fixer p.ex.
    # SystemMaxUse=2G dans journald.conf (config hôte, partagée par tous les conteneurs).
    logging:
      driver: journald
      options:
        tag: api-v2
    environment:
      - POSTGRES_HOST=dossarddb
      - POSTGRES_PORT=5432
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - JWT_SECRET
      - JWT_ACCESS_EXPIRE
      - JWT_REFRESH_EXPIRE
      - JWT_REFRESH_SECRET
      - FIREBASE_SERVICE_ACCOUNT_JSON
      - HELLOASSO_CLIENT_ID
      - HELLOASSO_CLIENT_SECRET
      - HELLOASSO_OAUTH_BASE_URL
      - HELLOASSO_API_BASE_URL
      - HELLOASSO_REDIRECT_URI
      - HELLOASSO_FRONT_RESULT_URL
      - HELLOASSO_TOKEN_ENCRYPTION_KEY
      - HELLOASSO_PAYMENT_RETURN_URL_SUCCESS
      - HELLOASSO_PAYMENT_RETURN_URL_ERROR
      - HELLOASSO_PAYMENT_RETURN_URL_CANCELLED
      - NODE_ENV=production
    depends_on:
      - dossarddb

  webapp-v2:
    container_name: webapp-v2
    image: ghcr.io/dngconsulting/opendossard_webapp-v2:latest
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "80"

  # ══════════════════════════════════════════════════════════
  # IMPORTER (one-shot) — import hebdo des randonnées FFvelo
  # ══════════════════════════════════════════════════════════
  # Conteneur ponctuel (profil "tools" → ne démarre PAS avec `up`). Externe à
  # api-v2 (image dédiée Dockerfile.importer, ts-node). Même réseau → joint
  # `dossarddb` ; mêmes env DB que api-v2. 404 source → skip exit 0 (pas d'alarme).
  #
  # Crontab de l'hôte (jeudi 03:00 Europe/Paris — fuseau épinglé pour ne pas
  # dériver avec l'heure d'été) :
  #   CRON_TZ=Europe/Paris
  #   0 3 * * 4  cd /opt/opendossard && docker compose -f docker-compose.prod.yml \
  #     --profile tools run --rm importer \
  #     --url https://veloenfrance.fr/data-cache/agenda-randonnees/liste.json \
  #     >> /var/log/import-ffvelo.log 2>&1
  importer:
    image: ghcr.io/dngconsulting/opendossard_importer:latest
    profiles:
      - tools
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_HOST=dossarddb
      - POSTGRES_PORT=5432
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - NODE_ENV=production
    depends_on:
      - dossarddb

  # ══════════════════════════════════════════════════════════
  # MONITORING
  # ══════════════════════════════════════════════════════════
  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    hostname: monitoring.opendossard.com
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    pid: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    expose:
      - "19999"
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - ./config/netdata/go.d/nginx.conf:/etc/netdata/go.d/nginx.conf:ro
      - ./config/netdata/go.d/postgres.conf:/etc/netdata/go.d/postgres.conf:ro
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      # Journal systemd de l'hôte aux chemins standards attendus par le plugin
      # systemd-journal de Netdata (Logs Explorer). Persistant + volatile.
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ══════════════════════════════════════════════════════════
  # REVERSE PROXY
  # ══════════════════════════════════════════════════════════
  website:
    image: nginx:1.27-alpine
    container_name: website
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./website/:/var/www/html
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./config/ssl.conf:/etc/nginx/ssl.conf
      - ./config/netdata.htpasswd:/etc/nginx/netdata.htpasswd:ro
      - /etc/letsencrypt/live/opendossard.com/fullchain.pem:/etc/letsencrypt/opendossard/cert.pem
      - /etc/letsencrypt/live/opendossard.com/privkey.pem:/etc/letsencrypt/opendossard/key.pem
      - /etc/letsencrypt/live/opendossard.com/dhparam.pem:/etc/letsencrypt/opendossard/dhparam.pem
    depends_on:
      - api_webapp
      - api-v2
      - webapp-v2
      - netdata

volumes:
  postgres:
  netdataconfig:
  netdatalib:
  netdatacache:
