name: Deploy V2
run-name: "Deploy V2 → ${{ inputs.envname }}${{ inputs.release != 'no' && format(' ({0})', inputs.release) || '' }}"

on:
  workflow_dispatch:
    inputs:
      envname:
        type: choice
        description: Environnement cible
        options:
          - TEST
          - PREPROD
          - PROD
        required: true
      release:
        type: choice
        description: Créer une release ?
        options:
          - 'no'
          - patch
          - minor
          - major
        required: true
        default: 'no'
      branch:
        type: string
        description: Branche à déployer (défaut = branche courante)
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/dngconsulting/opendossard_api-v2
  WEBAPP_IMAGE: ghcr.io/dngconsulting/opendossard_webapp-v2

jobs:
  # Optional: Create release if requested
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.release != 'no' }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Install dependencies
        working-directory: ./services/webapp-v2
        run: pnpm install

      - name: Setup git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release-it
        working-directory: ./services/webapp-v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx release-it ${{ github.event.inputs.release }} --ci

  # Run API v2 tests (only when creating a release)
  test-api:
    name: Test API v2
    runs-on: ubuntu-latest
    needs: [release]
    if: ${{ always() && github.event.inputs.release != 'no' && needs.release.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Pull latest changes (after release)
        if: ${{ github.event.inputs.release != 'no' }}
        run: git pull origin ${{ github.event.inputs.branch || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/api-v2/package-lock.json

      - name: Install dependencies
        working-directory: ./services/api-v2
        run: npm ci

      - name: Build
        working-directory: ./services/api-v2
        run: npm run build

      - name: Run E2E tests
        working-directory: ./services/api-v2
        run: npm run test:e2e

  # Build and push Docker images in parallel (only when creating a release)
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [release, test-api]
    if: ${{ always() && github.event.inputs.release != 'no' && needs.release.result == 'success' && needs.test-api.result == 'success' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api-v2
            dockerfile: ./Dockerfile.api-v2
            image_env: API_IMAGE
          - service: webapp-v2
            dockerfile: ./Dockerfile.webapp-v2
            image_env: WEBAPP_IMAGE

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Pull latest changes (after release)
        if: ${{ github.event.inputs.release != 'no' }}
        run: git pull origin ${{ github.event.inputs.branch || github.ref_name }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env[matrix.image_env] }}:latest
            ${{ env[matrix.image_env] }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # Deploy to target environment
  deploy:
    name: Deploy to ${{ github.event.inputs.envname }}
    needs: build-and-push
    if: ${{ always() && (needs.build-and-push.result == 'success' || (github.event.inputs.release == 'no' && needs.build-and-push.result == 'skipped')) }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.envname }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_ACCESS_EXPIRE: ${{ secrets.JWT_ACCESS_EXPIRE }}
          JWT_REFRESH_EXPIRE: ${{ secrets.JWT_REFRESH_EXPIRE }}
          JWT_EXPIRE_SECONDS: ${{ secrets.JWT_EXPIRE_SECONDS }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        with:
          host: ${{ secrets.HOSTNAME }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: POSTGRES_HOST,POSTGRES_PORT,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,JWT_SECRET,JWT_REFRESH_SECRET,JWT_ACCESS_EXPIRE,JWT_REFRESH_EXPIRE,JWT_EXPIRE_SECONDS,FIREBASE_SERVICE_ACCOUNT_JSON
          script: |
            export POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
            export POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
            export POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            export POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            export JWT_EXPIRE_SECONDS=${{ secrets.JWT_EXPIRE_SECONDS }}
            export JWT_ACCESS_EXPIRE=${{ secrets.JWT_ACCESS_EXPIRE }}
            export JWT_REFRESH_EXPIRE=${{ secrets.JWT_REFRESH_EXPIRE }}

            cd /home/dngconsulting/OpenDossard

            # Determine branch to deploy
            BRANCH="${{ github.event.inputs.branch }}"
            if [ -z "$BRANCH" ]; then
              BRANCH="${{ github.ref_name }}"
            fi
            echo "📦 Deploying branch: $BRANCH"

            # Fetch and checkout the target branch
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull origin "$BRANCH"

            # Generate netdata auth file (persisted on disk, survives container restarts)
            echo "${{ secrets.NETDATA_USER }}:$(openssl passwd -apr1 '${{ secrets.NETDATA_PASSWORD }}')" > config/netdata.htpasswd

            # Pull the new v2 images + netdata
            docker compose -f docker-compose.prod.yml pull api-v2 webapp-v2 netdata

            # Migrations TypeORM : appliquées au démarrage du container par
            # l'app elle-même (`migrationsRun: true` dans app.module.ts). Si
            # une migration foire, le container api-v2 crash au boot et
            # docker-compose remonte l'état dégradé. Plus de step manuel ici
            # — le step pré-`up` s'exécutait sur l'image courante du serveur,
            # ce qui masquait les bugs de pull non-sync (bug 2026-05-10 en
            # `release=no` sur PREPROD).

            # Start/restart v2 services + monitoring (v1 remains untouched)
            docker compose -f docker-compose.prod.yml up -d api-v2 webapp-v2 netdata

            # Restart nginx with new config
            docker compose -f docker-compose.prod.yml up -d --force-recreate website

            # Cleanup old images
            docker image prune --all --force &

            echo "✅ V2 deployment complete!"
            echo "🔗 Access at: https://$([[ "${{ github.event.inputs.envname }}" == "PROD" ]] && echo 'app' || echo '${{ github.event.inputs.envname }}' | tr '[:upper:]' '[:lower:]')-v2.opendossard.com"
